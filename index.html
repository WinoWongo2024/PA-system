<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PA System Simulator</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding: 20px; background: #0f172a; color: #f8fafc; }
    .card { background: #1e293b; padding: 20px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #334155; }
    h1 { color: #38bdf8; }
    button { background: #0284c7; color: white; border: none; padding: 14px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; width: 100%; max-width: 300px; }
    button:disabled { background: #64748b; cursor: not-allowed; }
    .status { margin-top: 10px; font-weight: 500; color: #38bdf8; }
  </style>
</head>
<body>

  <h1>🚆 PA System Simulator</h1>
  <div id="announcement-list">Loading announcements...</div>

  <script>
    const CONFIG_URL = 'https://raw.githubusercontent.com/WinoWongo2024/PA-system/main/announcements.json';

    async function loadApp() {
      try {
        const res = await fetch(CONFIG_URL);
        const data = await res.json();
        const container = document.getElementById('announcement-list');
        container.innerHTML = '';

        data.announcements.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <h3>${item.title}</h3>
            <button id="btn-${item.id}" onclick="handlePlayClick('${data.baseUrl}', ${JSON.stringify(item.sequence)}, '${item.id}')">▶ Play Announcement</button>
            <div id="status-${item.id}" class="status"></div>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        document.getElementById('announcement-list').innerText = 'Failed to load configuration. Check announcements.json.';
      }
    }

    async function handlePlayClick(baseUrl, filenames, id) {
      const btn = document.getElementById(`btn-${id}`);
      const status = document.getElementById(`status-${id}`);
      btn.disabled = true;

      // Create audio objects for each file
      const audioQueue = filenames.map(file => new Audio(baseUrl + file));

      // 1. Unlock playback by triggering play/pause on the first clip during the user tap
      try {
        await audioQueue[0].play();
        audioQueue[0].pause();
        audioQueue[0].currentTime = 0;
      } catch (e) {
        console.warn('Audio unlock warning:', e);
      }

      // 2. Play sequence back-to-back
      for (let i = 0; i < audioQueue.length; i++) {
        const audio = audioQueue[i];
        status.innerText = `Playing clip ${i + 1} of ${audioQueue.length}: ${decodeURIComponent(filenames[i])}`;

        await new Promise((resolve) => {
          audio.onended = resolve;
          audio.onerror = (e) => {
            console.error('Playback error on file:', filenames[i], e);
            resolve(); // Skip missing clip gracefully
          };
          
          audio.play().catch(err => {
            console.error('Play blocked:', err);
            resolve();
          });
        });
      }

      status.innerText = '✅ Announcement finished';
      btn.disabled = false;
    }

    loadApp();
  </script>
</body>
</html>
