<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Station PA Simulator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px;
      background-color: #0f172a;
      color: #f8fafc;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      color: #38bdf8;
      font-size: 1.8rem;
      margin-bottom: 20px;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 16px;
      border: 1px solid #334155;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    h3 {
      margin-top: 0;
      margin-bottom: 16px;
      color: #f1f5f9;
    }
    button {
      background: #0284c7;
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
      transition: background 0.2s ease;
    }
    button:active {
      background: #0369a1;
    }
    button:disabled {
      background: #475569;
      cursor: not-allowed;
    }
    .status {
      margin-top: 14px;
      font-size: 0.9rem;
      color: #38bdf8;
      font-family: monospace;
      min-height: 1.2em;
    }
    .error {
      color: #f87171;
    }
  </style>
</head>
<body>

  <h1>🚆 Station PA Control</h1>
  <div id="announcement-list">Loading announcements configuration...</div>

  <script>
    const CONFIG_URL = './announcements.json';
    const AUDIO_BASE_URL = './Audio/';

    async function loadApp() {
      const container = document.getElementById('announcement-list');
      try {
        const res = await fetch(CONFIG_URL);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}: Could not load ${CONFIG_URL}`);
        }
        const data = await res.json();
        
        container.innerHTML = '';

        data.announcements.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <h3>${item.title}</h3>
            <button id="btn-${item.id}" onclick="handlePlayClick(${JSON.stringify(item.sequence)}, '${item.id}')">▶ Play Announcement</button>
            <div id="status-${item.id}" class="status"></div>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        console.error(err);
        container.innerHTML = `<div class="card error">❌ <strong>Error:</strong> ${err.message}</div>`;
      }
    }

    async function handlePlayClick(filenames, id) {
      const btn = document.getElementById(`btn-${id}`);
      const status = document.getElementById(`status-${id}`);
      btn.disabled = true;

      for (let i = 0; i < filenames.length; i++) {
        // Decode first in case filenames contain %20, then cleanly encode for URL fetching
        const rawFileName = decodeURIComponent(filenames[i]);
        const safeFilePath = AUDIO_BASE_URL + encodeURIComponent(rawFileName);
        
        status.innerText = `[${i + 1}/${filenames.length}] Playing: ${rawFileName}`;

        await new Promise((resolve) => {
          const audio = new Audio(safeFilePath);

          audio.onended = resolve;
          
          audio.onerror = (e) => {
            console.error('Audio file failed to play:', safeFilePath, e);
            status.innerText = `⚠️ Missing/Failed clip: ${rawFileName}`;
            setTimeout(resolve, 1200); // Wait briefly then move to next
          };

          audio.play().catch(err => {
            console.error('Browser playback blocked or failed:', err);
            status.innerText = `❌ Error playing: ${rawFileName}`;
            setTimeout(resolve, 1200);
          });
        });
      }

      status.innerText = '✅ Announcement sequence completed';
      btn.disabled = false;
    }

    loadApp();
  </script>
</body>
</html>
