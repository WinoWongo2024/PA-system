<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Station PA & Display Simulator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      background-color: #0b0f19;
      color: #f8fafc;
      max-width: 650px;
      margin: 0 auto;
    }
    h1 { color: #38bdf8; font-size: 1.8rem; margin-bottom: 20px; }

    /* LED Board Display Styling */
    .led-board {
      background-color: #000;
      border: 4px solid #1e293b;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.25);
    }
    .led-header {
      font-size: 0.75rem;
      text-transform: uppercase;
      color: #64748b;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    
    /* Marquee Container */
    .led-screen-container {
      background: #050505;
      padding: 12px;
      border-radius: 4px;
      border: 1px solid #262626;
      height: 28px;
      display: flex;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    .led-text {
      font-family: "Courier New", Courier, monospace;
      font-size: 1.25rem;
      font-weight: bold;
      color: #f59e0b;
      text-shadow: 0 0 8px rgba(245, 158, 11, 0.8), 0 0 2px #d97706;
      white-space: nowrap;
      position: absolute;
    }

    /* Continuous Scrolling Animation */
    .scroll-active {
      animation: marquee 10s linear infinite;
    }

    @keyframes marquee {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid #334155;
    }
    button {
      background: #0284c7;
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
      -webkit-tap-highlight-color: transparent;
    }
    button:disabled { background: #475569; cursor: not-allowed; }
    .status { margin-top: 14px; font-size: 0.9rem; color: #38bdf8; font-family: monospace; }
    
    .log-container {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-top: 20px;
    }
    .log-header {
      font-weight: bold;
      color: #94a3b8;
      font-size: 0.85rem;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #console-log {
      font-family: monospace;
      font-size: 0.75rem;
      color: #4ade80;
      max-height: 180px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-err { color: #f87171; }
    .clear-btn {
      background: #334155;
      color: #cbd5e1;
      padding: 4px 8px;
      font-size: 0.7rem;
      width: auto;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>🚆 Station PA Control</h1>

  <!-- LED Departure Display Board -->
  <div class="led-board">
    <div class="led-header">Platform 1 Departure Board</div>
    <div class="led-screen-container">
      <div id="led-text" class="led-text">23:35 BATH SPA - PLATFORM 1</div>
    </div>
  </div>

  <div id="announcement-list">Loading configuration...</div>

  <div class="log-container">
    <div class="log-header">
      <span>📱 Mobile Debug Console</span>
      <button class="clear-btn" id="clear-log-btn">Clear</button>
    </div>
    <div id="console-log">Initializing log viewer...</div>
  </div>

  <script>
    const logBox = document.getElementById('console-log');
    const ledText = document.getElementById('led-text');
    
    function appendLog(msg, type = 'info') {
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      if (type === 'error') div.className = 'log-err';
      div.innerText = `[${time}] ${msg}`;
      logBox.appendChild(div);
      logBox.scrollTop = logBox.scrollHeight;
    }

    document.getElementById('clear-log-btn').onclick = () => { logBox.innerHTML = ''; };

    const origLog = console.log;
    const origErr = console.error;

    console.log = (...args) => { origLog(...args); appendLog(args.join(' '), 'info'); };
    console.error = (...args) => { origErr(...args); appendLog(args.join(' '), 'error'); };

    const CONFIG_URL = './announcements.json';
    const AUDIO_BASE_URL = './Audio/';

    async function loadApp() {
      console.log('Fetching configuration from: ' + CONFIG_URL);
      const container = document.getElementById('announcement-list');
      try {
        const res = await fetch(CONFIG_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}: Failed to fetch ${CONFIG_URL}`);
        
        const data = await res.json();
        console.log(`Loaded ${data.announcements.length} announcement definition(s).`);
        
        container.innerHTML = '';

        data.announcements.forEach((item) => {
          const card = document.createElement('div');
          card.className = 'card';
          
          const title = document.createElement('h3');
          title.innerText = item.title;
          
          const btn = document.createElement('button');
          btn.id = `btn-${item.id}`;
          btn.innerText = '▶ Play Announcement';
          
          const status = document.createElement('div');
          status.id = `status-${item.id}`;
          status.className = 'status';

          btn.addEventListener('click', () => {
            handlePlayClick(item.sequence, item.id, item.title);
          });

          card.appendChild(title);
          card.appendChild(btn);
          card.appendChild(status);
          container.appendChild(card);
        });
      } catch (err) {
        console.error(`App Load Error: ${err.message}`);
        container.innerHTML = `<div class="card" style="color:#f87171">❌ Error loading announcements.json</div>`;
      }
    }

    async function handlePlayClick(filenames, id, title) {
      console.log(`Starting sequence playback for ID: ${id}`);
      const btn = document.getElementById(`btn-${id}`);
      const status = document.getElementById(`status-${id}`);
      btn.disabled = true;

      // Start Scrolling LED Marquee
      ledText.innerText = `📢 ANNOUNCEMENT IN PROGRESS: ${title.toUpperCase()} -- CALLING AT ALL STATIONS --`;
      ledText.classList.add('scroll-active');

      for (let i = 0; i < filenames.length; i++) {
        const file = filenames[i];
        const fullPath = AUDIO_BASE_URL + file;
        
        console.log(`[Clip ${i + 1}/${filenames.length}] Path: ${fullPath}`);
        status.innerText = `Playing ${i + 1}/${filenames.length}: ${file}`;

        await new Promise((resolve) => {
          const audio = new Audio(fullPath);

          audio.onplay = () => {
            console.log(`Playing: ${file}`);
          };

          audio.onended = () => {
            console.log(`Finished: ${file}`);
            resolve();
          };

          audio.onerror = (e) => {
            console.error(`FAILED: ${fullPath}`);
            status.innerText = `⚠️ Failed clip: ${file}`;
            setTimeout(resolve, 1000);
          };

          audio.play().catch(err => {
            console.error(`PLAY BLOCKED: ${err.message}`);
            setTimeout(resolve, 1000);
          });
        });
      }

      console.log(`--- Finished Sequence ---`);
      status.innerText = '✅ Completed';
      
      // Stop Marquee and Reset LED Board
      ledText.classList.remove('scroll-active');
      ledText.innerText = `23:35 BATH SPA - PLATFORM 1`;
      
      btn.disabled = false;
    }

    loadApp();
  </script>
</body>
</html>
