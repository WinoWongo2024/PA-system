<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Station PA Simulator</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      background-color: #0f172a;
      color: #f8fafc;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 { color: #38bdf8; font-size: 1.8rem; margin-bottom: 20px; }
    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
      border: 1px solid #334155;
    }
    button {
      background: #0284c7;
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      width: 100%;
    }
    button:disabled { background: #475569; cursor: not-allowed; }
    .status { margin-top: 14px; font-size: 0.9rem; color: #38bdf8; font-family: monospace; }
    
    /* On-Screen Log Box */
    .log-container {
      background: #020617;
      border: 1px solid #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-top: 20px;
    }
    .log-header {
      font-weight: bold;
      color: #94a3b8;
      font-size: 0.85rem;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #console-log {
      font-family: monospace;
      font-size: 0.75rem;
      color: #4ade80;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-err { color: #f87171; }
    .log-warn { color: #fbbf24; }
    .clear-btn {
      background: #334155;
      color: #cbd5e1;
      padding: 4px 8px;
      font-size: 0.7rem;
      width: auto;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <h1>🚆 Station PA Control</h1>
  <div id="announcement-list">Loading configuration...</div>

  <!-- Mobile Console Log Box -->
  <div class="log-container">
    <div class="log-header">
      <span>📱 Mobile Debug Console</span>
      <button class="clear-btn" onclick="clearLogs()">Clear</button>
    </div>
    <div id="console-log">Initializing log viewer...\n</div>
  </div>

  <script>
    // 1. Intercept standard console outputs to print on mobile screen
    const logBox = document.getElementById('console-log');
    
    function appendLog(msg, type = 'info') {
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      if (type === 'error') div.className = 'log-err';
      if (type === 'warn') div.className = 'log-warn';
      div.innerText = `[${time}] ${msg}`;
      logBox.appendChild(div);
      logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLogs() {
      logBox.innerHTML = '';
    }

    // Override native console logs
    const origLog = console.log;
    const origErr = console.error;
    const origWarn = console.warn;

    console.log = (...args) => { origLog(...args); appendLog(args.join(' '), 'info'); };
    console.error = (...args) => { origErr(...args); appendLog(args.join(' '), 'error'); };
    console.warn = (...args) => { origWarn(...args); appendLog(args.join(' '), 'warn'); };

    // 2. PA App Logic
    const CONFIG_URL = './announcements.json';
    const AUDIO_BASE_URL = './Audio/';

    async function loadApp() {
      console.log('Fetching configuration from: ' + CONFIG_URL);
      const container = document.getElementById('announcement-list');
      try {
        const res = await fetch(CONFIG_URL);
        console.log(`Fetch HTTP status: ${res.status}`);
        
        if (!res.ok) throw new Error(`HTTP ${res.status}: Failed to fetch ${CONFIG_URL}`);
        
        const data = await res.json();
        console.log(`Loaded ${data.announcements.length} announcement definition(s).`);
        
        container.innerHTML = '';

        data.announcements.forEach(item => {
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <h3>${item.title}</h3>
            <button id="btn-${item.id}" onclick="handlePlayClick(${JSON.stringify(item.sequence)}, '${item.id}')">▶ Play Announcement</button>
            <div id="status-${item.id}" class="status"></div>
          `;
          container.appendChild(card);
        });
      } catch (err) {
        console.error(`App Load Error: ${err.message}`);
        container.innerHTML = `<div class="card" style="color:#f87171">❌ Error loading announcements.json</div>`;
      }
    }

    async function handlePlayClick(filenames, id) {
      console.log(`\n--- Starting Announcement: ${id} ---`);
      const btn = document.getElementById(`btn-${id}`);
      const status = document.getElementById(`status-${id}`);
      btn.disabled = true;

      for (let i = 0; i < filenames.length; i++) {
        const file = filenames[i];
        const fullPath = AUDIO_BASE_URL + file;
        
        console.log(`[Clip ${i + 1}/${filenames.length}] Attempting path: ${fullPath}`);
        status.innerText = `Playing ${i + 1}/${filenames.length}: ${file}`;

        await new Promise((resolve) => {
          const audio = new Audio(fullPath);

          audio.onplay = () => {
            console.log(`SUCCESS: Playing ${file}`);
          };

          audio.onended = () => {
            console.log(`FINISHED: ${file}`);
            resolve();
          };

          audio.onerror = (e) => {
            console.error(`FAILED to load/play: ${fullPath} (Media Code: ${audio.error ? audio.error.code : 'unknown'})`);
            status.innerText = `⚠️ Failed clip: ${file}`;
            setTimeout(resolve, 1000);
          };

          audio.play().catch(err => {
            console.error(`PLAY BLOCKED by Browser: ${err.name} - ${err.message}`);
            setTimeout(resolve, 1000);
          });
        });
      }

      console.log(`--- Sequence Completed ---\n`);
      status.innerText = '✅ Completed';
      btn.disabled = false;
    }

    loadApp();
  </script>
</body>
</html>
